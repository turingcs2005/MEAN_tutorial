<mat-toolbar>
    <div>
        <mat-icon [matMenuTriggerFor]="appMenu">menu</mat-icon> &nbsp;
        <mat-icon routerLink="/">home</mat-icon>
    </div>
    <span>MEAN Stack Tutorial</span> 
    <mat-icon>help</mat-icon>
</mat-toolbar>

<mat-menu #appMenu="matMenu">
    <button mat-menu-item [matMenuTriggerFor]="developmentEnvironmentMenu">Getting started</button>
    <button mat-menu-item [matMenuTriggerFor]="toolingMenu">Tooling</button>
    <button mat-menu-item [matMenuTriggerFor]="angularMenu">Angular</button>
</mat-menu>

<mat-menu #developmentEnvironmentMenu="matMenu">
    <button mat-menu-item routerLink="/development-environment/set-up">Software installation</button>
    <button mat-menu-item routerLink="/development-environment/vsc-settings">VS Code Settings</button>
    <button mat-menu-item routerLink="/development-environment/npm">Key npm commands</button>
</mat-menu>

<mat-menu #toolingMenu="matMenu">
    <button mat-menu-item routerLink="/tooling/ai-assistance">AI Assistance</button>
    <button mat-menu-item routerLink="/tooling/vim">Vim</button>
    <button mat-menu-item routerLink="/tooling/git">Git</button>
    <button mat-menu-item routerLink="/tooling/nvm">NVM</button>
</mat-menu>
    
<mat-menu #angularMenu="matMenu">
    <button mat-menu-item routerLink="/angular/set-up">Setup</button>
</mat-menu>
